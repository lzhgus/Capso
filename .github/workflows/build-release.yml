name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create draft GitHub Release'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      SCHEME: Capso
      APP_NAME: Capso
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Capso.xcodeproj \
            -scheme "$SCHEME"

      # -----------------------------------------------------------------
      # Import the Developer ID Application certificate into a temporary
      # keychain so xcodebuild can sign the app.
      #
      # Required GitHub Secrets:
      #   BUILD_CERTIFICATE_BASE64 — base64 of the exported .p12 (see README below)
      #   P12_PASSWORD             — password you set when exporting the .p12
      #   KEYCHAIN_PASSWORD        — any string; used as the temp-keychain password
      #   APPLE_ID                 — your Apple ID email
      #   APPLE_TEAM_ID            — 10-char Team ID (e.g. T247WTJV77)
      #   NOTARIZE_PASSWORD        — app-specific password from appleid.apple.com
      # -----------------------------------------------------------------
      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Restore the .p12 from the base64 secret
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create a dedicated, ephemeral keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import cert + allow codesign tool to use it without UI prompts
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Make the new keychain searchable (prepend to the search list)
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '" ')

          # Sanity check
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Archive (Release, Developer ID, hardened runtime)
        run: |
          set -euo pipefail
          mkdir -p build/archive build/export build/releases

          xcodebuild archive \
            -project Capso.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/archive/Capso.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            -quiet

          APP_PATH="build/archive/Capso.xcarchive/Products/Applications/${APP_NAME}.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: ${APP_NAME}.app not found in archive"
            find build -name "${APP_NAME}.app" -type d
            exit 1
          fi
          cp -R "$APP_PATH" "build/export/${APP_NAME}.app"

          # Verify the signature and hardened runtime
          codesign --verify --deep --strict --verbose=2 "build/export/${APP_NAME}.app"
          codesign -dvv "build/export/${APP_NAME}.app" 2>&1 | grep -E "flags|Authority" || true

      - name: Notarize .app
        run: |
          set -euo pipefail
          APP="build/export/${APP_NAME}.app"
          NOTARIZE_ZIP="build/export/${APP_NAME}-notarize.zip"

          ditto -c -k --keepParent "$APP" "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          rm -f "$NOTARIZE_ZIP"

      - name: Staple notarization ticket
        run: |
          set -euo pipefail
          APP="build/export/${APP_NAME}.app"
          # Apple's CDN may take a moment to distribute the ticket after
          # notarization completes. Retry stapling up to 5 times with a
          # 15-second delay between attempts.
          for i in 1 2 3 4 5; do
            if xcrun stapler staple "$APP"; then
              break
            fi
            echo "Staple attempt $i failed, retrying in 15s..."
            sleep 15
          done
          xcrun stapler validate "$APP"
          spctl -a -t exec -vv "$APP" || true

      - name: Create ZIP
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="build/releases/${APP_NAME}-${VERSION}.zip"
          (cd build/export && ditto -c -k --keepParent "${APP_NAME}.app" "../../$ZIP")
          ls -lh "$ZIP"

      - name: Create DMG
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DMG="build/releases/${APP_NAME}-${VERSION}.dmg"

          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "${APP_NAME}.app" 180 180 \
            --app-drop-link 480 180 \
            --hide-extension "${APP_NAME}.app" \
            --no-internet-enable \
            "$DMG" \
            "build/export/${APP_NAME}.app"

          # Sign the DMG with Developer ID
          codesign --force \
            --sign "Developer ID Application" \
            --timestamp \
            "$DMG"

          ls -lh "$DMG"

      - name: Notarize and staple DMG
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DMG="build/releases/${APP_NAME}-${VERSION}.dmg"

          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capso-${{ steps.version.outputs.version }}
          path: |
            build/releases/*.dmg
            build/releases/*.zip

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Capso ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            build/releases/*.dmg
            build/releases/*.zip

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DMG="build/releases/${APP_NAME}-${VERSION}.dmg"
          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')

          git clone https://x-access-token:${GH_TOKEN}@github.com/lzhgus/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/capso.rb << CASK
          cask "capso" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/lzhgus/Capso/releases/download/v#{version}/Capso-#{version}.dmg"
            name "Capso"
            desc "Open-source screenshot and screen recording for macOS"
            homepage "https://github.com/lzhgus/Capso"

            depends_on macos: ">= :sequoia"

            app "Capso.app"

            zap trash: [
              "~/Library/Preferences/com.awesomemacapps.capso.plist",
            ]
          end
          CASK

          # Remove leading whitespace from heredoc indentation
          sed -i '' 's/^          //' Casks/capso.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/capso.rb
          git commit -m "Update Capso to v${VERSION}"
          git push

      - name: Update Sparkle appcast on gh-pages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.version }}"
          DMG="build/releases/${APP_NAME}-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG")
          PUB_DATE=$(date -R)

          # Clone only the gh-pages branch
          git clone --branch gh-pages --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/lzhgus/Capso.git /tmp/gh-pages
          cd /tmp/gh-pages

          cat > appcast.xml << APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Capso Updates</title>
              <link>https://lzhgus.github.io/Capso/appcast.xml</link>
              <description>Open-source screenshot and screen recording for macOS</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/lzhgus/Capso/releases/download/v${VERSION}/Capso-${VERSION}.dmg"
                  type="application/octet-stream"
                  length="${DMG_SIZE}"
                />
              </item>
            </channel>
          </rss>
          APPCAST

          # Remove leading whitespace from heredoc indentation
          sed -i '' 's/^          //' appcast.xml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for v${VERSION}"
          git push
